services:
  - type: web
    name: go-bot-workflow2-1-drive-csv-consolidation
    runtime: docker
    plan: starter
    autoDeployTrigger: "off"
    healthCheckPath: /healthz
    dockerfilePath: workflows/wf21-drive-csv-consolidation/Dockerfile.render
    dockerContext: .
    disk:
      name: wf21-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: BOT_CONFIG_SHEET_ID
        value: 1pLN46ZKWJIsidswMeoxhZwoacuFMR08sCaTFG6mLytc
      - key: BOT_CONFIG_TAB
        value: bot_config
      - key: WF21_CONTINUOUS
        value: "true"
      - key: WF21_POLL_INTERVAL_SECONDS
        value: "3"
      - key: WF21_DRY_RUN
        value: "false"
      - key: WF21_BOOTSTRAP_PROCESS_EXISTING
        value: "false"
      - key: WF21_DROP_LEADING_UNNAMED_COLUMN
        value: "true"
      - key: WF21_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF21_HEALTH_PORT
        value: ""
      - key: WF21_DRIVE_PARENT_FOLDER_ID
        value: 1oU9kj5VIJIoNrR388wYCHSdtHGanRrgZ
      - key: WF21_DESTINATION_SHEET_ID
        value: 1mdi-8ACluDHGZ7yAyNLwXLwpmQ4f6VAx3kpbaJORViA
      - key: WF21_DESTINATION_TAB_PENDING_RCV
        value: pending_rcv
      - key: WF21_DESTINATION_TAB_PACKED_IN_ANOTHER_TO
        value: packed_in_another_to
      - key: WF21_DESTINATION_TAB_NO_LHPACKING
        value: no_lhpacking
      - key: WF21_R2_OBJECT_PREFIX
        value: wf2-1
      - key: WF21_STATE_FILE
        value: /var/data/workflow2-1-drive-csv-consolidation-state.json
      - key: WF21_STATUS_FILE
        value: /var/data/workflow2-1-drive-csv-consolidation-status.json
      - key: WF21_NEWRELIC_LOGS_ENABLED
        value: "false"
      - key: WF21_NEWRELIC_LOG_API_URL
        value: https://log-api.newrelic.com/log/v1
      - key: WF21_NEWRELIC_SOURCE
        value: workflow_2_1_drive_csv_consolidation
      - key: WF21_NEWRELIC_SERVICE
        value: wf21-drive-csv-consolidation
      - key: WF21_NEWRELIC_ENVIRONMENT
        value: render
      - key: WF21_NEWRELIC_LOGS_BATCH_SIZE
        value: "50"
      - key: WF21_NEWRELIC_LOGS_BATCH_WAIT_SECONDS
        value: "2"
      - key: WF21_NEWRELIC_LOGS_QUEUE_SIZE
        value: "1000"
      - key: WF21_NEWRELIC_LOGS_TIMEOUT_SECONDS
        value: "8"
      - key: WF21_SHEETS_BATCH_SIZE
        value: "7000"
      - key: WF21_SHEETS_WRITE_RETRY_MAX_ATTEMPTS
        value: "6"
      - key: WF21_SHEETS_WRITE_RETRY_BASE_MS
        value: "1000"
      - key: WF21_SHEETS_WRITE_RETRY_MAX_MS
        value: "15000"
      - key: WF21_TEMP_DIR
        value: ""
      - key: WF21_SUMMARY_SEND_ENABLED
        value: "true"
      - key: WF21_USE_BOT_CONFIG
        value: "false"
      - key: WF21_SUMMARY_SEATALK_MODE
        value: bot
      - key: WF21_SEATALK_BASE_URL
        value: https://openapi.seatalk.io
      - key: WF21_SUMMARY_TAB
