      - key: WF21_SUMMARY_WAIT_SECONDS
        value: "1"
      - key: WF21_SUMMARY_SEND_MIN_INTERVAL_SECONDS
        value: "1"
      - key: WF21_SUMMARY_STABILITY_RUNS
        value: "3"
      - key: WF21_SUMMARY_STABILITY_WAIT_SECONDS
        value: "1"
      - key: WF21_SUMMARY_RENDER_MODE
