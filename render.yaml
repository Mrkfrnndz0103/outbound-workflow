        value: Asia/Manila
      - key: WF21_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF21_R2_ACCOUNT_ID
        sync: false
      - key: WF21_R2_BUCKET
        sync: false
      - key: WF21_R2_ACCESS_KEY_ID
        sync: false
      - key: WF21_R2_SECRET_ACCESS_KEY
        sync: false
      - key: WF21_NEWRELIC_LICENSE_KEY
        sync: false
      - key: WF21_SEATALK_APP_ID
        sync: false
      - key: WF21_SEATALK_APP_SECRET
        sync: false
      - key: WF21_SEATALK_GROUP_ID
        sync: false
      - key: WF21_SEATALK_GROUP_IDS
        sync: false
      - key: WF21_SEATALK_WEBHOOK_URL
        sync: false
