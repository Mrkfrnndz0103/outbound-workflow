services:
  - type: web
    name: go-bot-seatalk-bot
    runtime: go
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: go build -o bin/seatalk-bot ./cmd/seatalk-bot
    startCommand: ./bin/seatalk-bot
    envVars:
      - key: SEATALK_MODE
        value: bot
      - key: SEATALK_BASE_URL
        value: https://openapi.seatalk.io
      - key: SEATALK_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: BOT_COMMAND_PREFIX
        value: /
      - key: WORKFLOWS_FILE
        value: workflows.yaml
      - key: WORKFLOW_DEFAULT_TIMEOUT_SECONDS
        value: "120"
      - key: BOT_CONFIG_SHEET_ID
        value: 1pLN46ZKWJIsidswMeoxhZwoacuFMR08sCaTFG6mLytc
      - key: BOT_CONFIG_TAB
        value: bot_config
      - key: BOT_CONFIG_SYNC_BASE_URL
        value: https://openapi.seatalk.io
      - key: BOT_CONFIG_SYNC_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF21_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF1_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF2_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: SEATALK_SIGNING_SECRET
        sync: false
      - key: SEATALK_APP_ID
        sync: false
      - key: SEATALK_APP_SECRET
        sync: false
      - key: WF21_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF1_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF2_GOOGLE_CREDENTIALS_JSON
        sync: false

  - type: web
    name: go-bot-workflow-mm-lh-provided
    runtime: go
    plan: free
    autoDeploy: false
    healthCheckPath: /healthz
    buildCommand: go build -o bin/workflow-mm-lh-provided ./workflows/wf1-mm-lh-provided/cmd
    startCommand: ./bin/workflow-mm-lh-provided
    envVars:
      - key: WF1_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF1_CONTINUOUS
        value: "true"
      - key: WF1_POLL_INTERVAL_SECONDS
        value: "1"
      - key: WF1_FORCE_SEND_AFTER_SECONDS
        value: "60"
      - key: WF1_MAX_READY_AGE_SECONDS
        value: "300"
      - key: WF1_PROVIDE_TIME_MIN_AGE_SECONDS
        value: "0"
      - key: WF1_GROUP_DEFER_SECONDS
        value: "20"
      - key: WF1_SEND_MIN_INTERVAL_MS
        value: "1200"
      - key: WF1_SEND_RETRY_MAX_ATTEMPTS
        value: "5"
      - key: WF1_SEND_RETRY_BASE_MS
        value: "1000"
      - key: WF1_SEND_RETRY_MAX_MS
        value: "30000"
      - key: WF1_BOOTSTRAP_SEND_EXISTING
        value: "false"
      - key: WF1_AT_ALL
        value: "false"
      - key: WF1_DEBUG_LOG_SKIPS
        value: "false"
      - key: WF1_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF1_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF1_HEALTH_PORT
        value: ""
      - key: WF1_SELF_PING_INTERVAL_SECONDS
        value: "300"
      - key: WF1_DRY_RUN
        value: "false"
      - key: WF1_STATE_FILE
        value: data/workflow1-mm-lh-provided-state.json
      - key: WF1_STATUS_FILE
        value: data/workflow1-mm-lh-provided-status.json
      - key: WF1_SHEET_ID
        value: 1mhzIfYfF1VSA9sPiqnLw7OgY1S_gI0wEzkXBQ1CCuDg
      - key: WF1_SHEET_TAB
        value: MM LH Provided
      - key: WF1_SHEET_RANGE
        value: A1658:M
      - key: BOT_CONFIG_SHEET_ID
        value: 1pLN46ZKWJIsidswMeoxhZwoacuFMR08sCaTFG6mLytc
      - key: BOT_CONFIG_TAB
        value: bot_config
      - key: WF1_SEATALK_MODE
        value: bot
      - key: WF1_SEATALK_GROUP_ID
        value: MTQ4Mzk5MDI0NjYw
      - key: WF1_SEATALK_APP_ID
        value: MzQ0MDc5Nzc5MjQ2
      - key: WF1_SEATALK_BASE_URL
        value: https://openapi.seatalk.io
      - key: SEATALK_SYSTEM_WEBHOOK_URL
        sync: false
      - key: WF1_SEATALK_APP_SECRET
        sync: false
      - key: WF1_SEATALK_WEBHOOK_URL
        sync: false
      - key: WF1_GOOGLE_CREDENTIALS_JSON
        sync: false
      # Optional per-environment URL; keep unmanaged unless you want Blueprint to overwrite it.
      - key: WF1_SELF_PING_URL
        sync: false

  - type: web
    name: go-bot-workflow3-mdt-updates
    runtime: docker
    plan: starter
    autoDeploy: false
    healthCheckPath: /healthz
    dockerfilePath: workflows/wf3-mdt-updates/Dockerfile.render
    dockerContext: .
    disk:
      name: wf3-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: WF3_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF3_CONTINUOUS
        value: "true"
      - key: WF3_POLL_INTERVAL_SECONDS
        value: "3"
      - key: WF3_SEND_DEBOUNCE_SECONDS
        value: "180"
      - key: WF3_SEND_MIN_INTERVAL_SECONDS
        value: "1"
      - key: WF3_STABILITY_RUNS
        value: "3"
      - key: WF3_STABILITY_WAIT_SECONDS
        value: "2"
      - key: WF3_BOOTSTRAP_SEND_EXISTING
        value: "false"
      - key: WF3_DRY_RUN
        value: "false"
      - key: WF3_TEST_SEND_ONCE
        value: "false"
      - key: WF3_HTTP_TIMEOUT_SECONDS
        value: "90"
      - key: WF3_TIMEZONE
        value: "Asia/Manila"
      - key: WF3_PDF_DPI
        value: "180"
      - key: WF3_PDF_CONVERTER
        value: "pdftoppm"
      - key: WF3_IMAGE_MAX_BASE64_BYTES
        value: "5242880"
      - key: WF3_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF3_HEALTH_PORT
        value: ""
      - key: WF3_TEMP_DIR
        value: ""
      - key: WF3_SHEET_ID
        value: 1pLN46ZKWJIsidswMeoxhZwoacuFMR08sCaTFG6mLytc
      - key: WF3_SHEET_TAB
        value: mdt
      - key: WF3_MONITOR_RANGE
        value: G1:O227
      - key: WF3_IMAGE_RANGES
        value: mdt!B1:P42,mdt!B44:P108,mdt!B109:P166,mdt!B167:P196,mdt!B198:P231
      - key: WF3_IMAGE1_FIXED_HIDE_ROWS
        value: 16-26,28,30,32-37,39-40
      - key: WF3_SEATALK_BASE_URL
        value: https://openapi.seatalk.io
      - key: WF3_STATE_FILE
        value: /var/data/workflow3-mdt-updates-state.json
      - key: WF3_STATUS_FILE
        value: /var/data/workflow3-mdt-updates-status.json
      - key: WF3_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF3_SEATALK_APP_ID
        sync: false
      - key: WF3_SEATALK_APP_SECRET
        sync: false
      - key: WF3_SEATALK_GROUP_ID
        sync: false

  - type: cron
    name: go-bot-sync-bot-config-groups
    runtime: go
    plan: starter
    autoDeploy: true
    schedule: "0 0 * * *"
    buildCommand: go build -o bin/bot-config-group-sync ./cmd/bot-config-group-sync
    startCommand: ./bin/bot-config-group-sync
    envVars:
      - key: BOT_CONFIG_SHEET_ID
        value: 1pLN46ZKWJIsidswMeoxhZwoacuFMR08sCaTFG6mLytc
      - key: BOT_CONFIG_TAB
        value: bot_config
      - key: BOT_CONFIG_SYNC_BASE_URL
        value: https://openapi.seatalk.io
      - key: BOT_CONFIG_SYNC_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF21_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF21_GOOGLE_CREDENTIALS_JSON
        sync: false

