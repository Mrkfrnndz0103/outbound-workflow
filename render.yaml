services:
  - type: web
    name: go-bot-workflow-mm-lh-provided
    runtime: go
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: go build -o bin/workflow-mm-lh-provided ./cmd/workflow-mm-lh-provided
    startCommand: ./bin/workflow-mm-lh-provided
    envVars:
      - key: WF1_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF1_CONTINUOUS
        value: "true"
      - key: WF1_POLL_INTERVAL_SECONDS
        value: "3"
      - key: WF1_FORCE_SEND_AFTER_SECONDS
        value: "300"
      - key: WF1_GROUP_DEFER_SECONDS
        value: "20"
      - key: WF1_SEND_MIN_INTERVAL_MS
        value: "1200"
      - key: WF1_SEND_RETRY_MAX_ATTEMPTS
        value: "5"
      - key: WF1_SEND_RETRY_BASE_MS
        value: "1000"
      - key: WF1_SEND_RETRY_MAX_MS
        value: "30000"
      - key: WF1_BOOTSTRAP_SEND_EXISTING
        value: "false"
      - key: WF1_AT_ALL
        value: "false"
      - key: WF1_DEBUG_LOG_SKIPS
        value: "false"
      - key: WF1_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF1_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF1_HEALTH_PORT
        value: ""
      - key: WF1_SELF_PING_INTERVAL_SECONDS
        value: "300"
      - key: WF1_DRY_RUN
        value: "false"
      - key: WF1_STATE_FILE
        value: data/workflow1-mm-lh-provided-state.json
      - key: WF1_STATUS_FILE
        value: data/workflow1-mm-lh-provided-status.json
      - key: WF1_SHEET_ID
        value: 1mhzIfYfF1VSA9sPiqnLw7OgY1S_gI0wEzkXBQ1CCuDg
      - key: WF1_SHEET_TAB
        value: MM LH Provided
      - key: WF1_SHEET_RANGE
        value: A650:M
      - key: SEATALK_SYSTEM_WEBHOOK_URL
        sync: false
      - key: WF1_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF1_SELF_PING_URL
        sync: false

  - type: web
    name: go-bot-workflow-drive-csv-consolidation
    runtime: go
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: go build -o bin/workflow-drive-csv-consolidation ./cmd/workflow-drive-csv-consolidation
    startCommand: ./bin/workflow-drive-csv-consolidation
    envVars:
      - key: WF21_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF21_DRIVE_PARENT_FOLDER_ID
        value: 1oU9kj5VIJIoNrR388wYCHSdtHGanRrgZ
      - key: WF21_DESTINATION_SHEET_ID
        value: 1mdi-8ACluDHGZ7yAyNLwXLwpmQ4f6VAx3kpbaJORViA
      - key: WF21_DESTINATION_TAB
        value: generated_file
      - key: WF21_R2_OBJECT_PREFIX
        value: wf2-1
      - key: WF21_STATE_FILE
        value: data/workflow2-1-drive-csv-consolidation-state.json
      - key: WF21_STATUS_FILE
        value: data/workflow2-1-drive-csv-consolidation-status.json
      - key: WF21_BOOTSTRAP_PROCESS_EXISTING
        value: "true"
      - key: WF21_DROP_LEADING_UNNAMED_COLUMN
        value: "true"
      - key: WF21_DRY_RUN
        value: "false"
      - key: WF21_CONTINUOUS
        value: "true"
      - key: WF21_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF21_HEALTH_PORT
        value: ""
      - key: WF21_POLL_INTERVAL_SECONDS
        value: "30"
      - key: WF21_SHEETS_BATCH_SIZE
        value: "1000"
      - key: WF21_TEMP_DIR
        value: ""
      - key: WF21_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF21_R2_ACCOUNT_ID
        sync: false
      - key: WF21_R2_BUCKET
        sync: false
      - key: WF21_R2_ACCESS_KEY_ID
        sync: false
      - key: WF21_R2_SECRET_ACCESS_KEY
        sync: false

