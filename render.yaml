services:
  - type: web
    name: go-bot-workflow-mm-lh-provided
    runtime: go
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: go build -o bin/workflow-mm-lh-provided ./cmd/workflow-mm-lh-provided
    startCommand: ./bin/workflow-mm-lh-provided
    envVars:
      - key: WF1_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF1_CONTINUOUS
        value: "true"
      - key: WF1_POLL_INTERVAL_SECONDS
        value: "3"
      - key: WF1_FORCE_SEND_AFTER_SECONDS
        value: "300"
      - key: WF1_GROUP_DEFER_SECONDS
        value: "20"
      - key: WF1_SEND_MIN_INTERVAL_MS
        value: "1200"
      - key: WF1_SEND_RETRY_MAX_ATTEMPTS
        value: "5"
      - key: WF1_SEND_RETRY_BASE_MS
        value: "1000"
      - key: WF1_SEND_RETRY_MAX_MS
        value: "30000"
      - key: WF1_BOOTSTRAP_SEND_EXISTING
        value: "false"
      - key: WF1_AT_ALL
        value: "false"
      - key: WF1_DEBUG_LOG_SKIPS
        value: "false"
      - key: WF1_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF1_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF1_HEALTH_PORT
        value: ""
      - key: WF1_SELF_PING_INTERVAL_SECONDS
        value: "300"
      - key: WF1_DRY_RUN
        value: "false"
      - key: WF1_STATE_FILE
        value: data/workflow1-mm-lh-provided-state.json
      - key: WF1_STATUS_FILE
        value: data/workflow1-mm-lh-provided-status.json
      - key: WF1_SHEET_ID
        value: 1mhzIfYfF1VSA9sPiqnLw7OgY1S_gI0wEzkXBQ1CCuDg
      - key: WF1_SHEET_TAB
        value: MM LH Provided
      - key: WF1_SHEET_RANGE
        value: A650:M
      - key: SEATALK_SYSTEM_WEBHOOK_URL
        sync: false
      - key: WF1_GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: WF1_SELF_PING_URL
        sync: false

  - type: web
    name: go-bot-workflow-ob-pending-dispatch
    runtime: go
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    buildCommand: go build -o bin/workflow-ob-pending-dispatch ./cmd/workflow-ob-pending-dispatch
    startCommand: ./bin/workflow-ob-pending-dispatch
    envVars:
      - key: WF2_GOOGLE_CREDENTIALS_FILE
        value: ""
      - key: WF2_SHEET_ID
        value: 17cvCc6ffMXNs6JYnpMYvDO_V8nBCRKRm3G78oINj_yo
      - key: WF2_SHEET_TAB
        value: Backlogs Summary
      - key: WF2_CAPTURE_RANGE
        value: C2:R64
      - key: WF2_SECOND_CAPTURE_TAB
        value: SOLIIS & MINDANAO
      - key: WF2_SECOND_CAPTURE_RANGE
        value: B1:K41
      - key: WF2_TRIGGER_CELL
        value: G4
      - key: WF2_CONTINUOUS
        value: "true"
      - key: WF2_POLL_INTERVAL_SECONDS
        value: "10"
      - key: WF2_BOOTSTRAP_SEND_EXISTING
        value: "false"
      - key: WF2_DRY_RUN
        value: "false"
      - key: WF2_HTTP_TIMEOUT_SECONDS
        value: "10"
      - key: WF2_TIMEZONE
        value: Asia/Manila
      - key: WF2_IMAGE_MAX_WIDTH_PX
        value: "3000"
      - key: WF2_IMAGE_MAX_BASE64_BYTES
        value: "5242880"
      - key: WF2_RENDER_SCALE
        value: "2"
      - key: WF2_SECOND_RENDER_SCALE
        value: "2"
      - key: WF2_STABILITY_RUNS
        value: "3"
      - key: WF2_STABILITY_WAIT_SECONDS
        value: "2"
      - key: WF2_ENABLE_HEALTH_SERVER
        value: "true"
      - key: WF2_HEALTH_PORT
        value: ""
      - key: WF2_STATE_FILE
        value: data/workflow2-ob-pending-dispatch-state.json
      - key: WF2_STATUS_FILE
        value: data/workflow2-ob-pending-dispatch-status.json
      - key: SEATALK_BASE_URL
        value: https://openapi.seatalk.io
      - key: WF2_SEATALK_APP_ID
        sync: false
      - key: WF2_SEATALK_APP_SECRET
        sync: false
      - key: WF2_SEATALK_GROUP_ID
        sync: false
      - key: WF2_GOOGLE_CREDENTIALS_JSON
        sync: false
