workflows:
  workflow_1_mm_lh_provided:
    command: go
    args:
      - run
      - ./workflows/wf1-mm-lh-provided/cmd
    timeout_seconds: 120
    allow_extra_args: false

  workflow_2_1_drive_csv_consolidation:
    enabled: true
    command: go
    args:
      - run
      - ./workflows/wf21-drive-csv-consolidation/cmd
    timeout_seconds: 900
    allow_extra_args: false
    env:
      WF21_CONTINUOUS: "true"
      WF21_POLL_INTERVAL_SECONDS: "30"

  sync_bot_config_groups:
    enabled: true
    command: go
    args:
      - run
      - ./cmd/bot-config-group-sync
    timeout_seconds: 180
    allow_extra_args: false

  ping:
    command: cmd
    args:
      - /C
      - echo
      - pong
    timeout_seconds: 20
    allow_extra_args: false

  run_script:
    command: powershell
    args:
      - -NoProfile
      - -ExecutionPolicy
      - Bypass
      - -File
      - scripts/workflow.ps1
    timeout_seconds: 180
    allow_extra_args: true
